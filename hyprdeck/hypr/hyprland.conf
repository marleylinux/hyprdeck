################
### MONITORS ###
################
monitorv2 {
  output = HDMI-A-1
  mode = 1920x1080@200
  position = 0x0
  scale = 1
  bitdepth = 10
  cm = hdredid
  sdrbrightness = 1
  sdrsaturation = 1
  sdr_min_luminance = 0.05
  sdr_max_luminance = 200
}
#################
### AUTOSTART ###
#################
exec-once = nwg-panel
exec-once = hyprpaper
exec-once = blueman-applet
exec-once = [workspace 3 silent] steam

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GTK_THEME,adw-gtk3-dark
env = XCURSOR_THEME,catppuccin-mocha-dark-cursors
env = HYPRCURSOR_THEME,catppuccin-mocha-dark-cursors

#####################
####### LOOKS #######
#####################
general {
    gaps_in = 10
    gaps_out = 20
    border_size = 2

    col.active_border = rgba(ffffffff)
    col.inactive_border = rgba(000000ff)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 15
    active_opacity = 1
    inactive_opacity = 0.9
    blur {
        enabled = true
        size = 4
        passes = 1
        vibrancy = 1
        brightness = 1
        new_optimizations = true
        noise = 0
        xray = false
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true     
    preserve_split = true 
}

master {
    new_status = master
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0 
}
device {
    name = 2.4g-wireless-device-1
    sensitivity = -0.6
}

#############
### MISC ####
#############
cursor {
    sync_gsettings_theme = true
}

xwayland {
    enabled = true
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER
# Volume control (repeat while held = binde, works even when locked = l)
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = $mainMod, F, fullscreen
bind = $mainMod, R, exec, resources
bind = $mainMod, P, exec, proton-pass
bind = $mainMod, M, exec, proton-mail
bind = $mainMod_Shift, Return, exec, brave
bind = $mainMod, Return, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, Escape, exec, nwg-bar
bind = $mainMod, E, exec, nautilus
bind = $mainMod, Z, togglefloating,
bind = $mainMod, Space, exec, nwg-drawer -nofs -ovl -nocats -ml 400 -mr 400 -mt 200 -mb 200 -c 5
bind = $mainMod, X, pseudo, # dwindle
bind = $mainMod, C, togglesplit, # dwindle

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3

# Move active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3

# Scroll through existing workspaces 
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows 
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

##############################
### WINDOWS AND WORKSPACES ###
##############################
workspace = 1, monitor:HDMI-A-1, default:true, persistent:true
workspace = 2, monitor:HDMI-A-1, persistent:true
workspace = 3, monitor:HDMI-A-1, persistent:true

windowrule {
  name = steam-to-ws3
  match:class = steam
  workspace = 3 silent
}

windowrule {
  name = polkit-to-ws3
  match:class = gcr-prompter
  workspace = 3
}

windowrule {
  name = hyprland-update-to-ws3
  match:class = hyprland-donate-screen
  workspace = 3 silent
}

windowrule {
  name = brave-to-ws2
  match:class = brave-browser
  workspace = 2
}


